<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SplitSheet — Excel Destination Splitter</title>
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' x2='1' y1='0' y2='1'><stop offset='0' stop-color='%233b82f6'/><stop offset='1' stop-color='%2310b981'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><path d='M18 18h10v10H18zM36 18h10v10H36zM18 36h10v10H18zM36 36h10v10H36z' fill='white'/></svg>"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root { --bg:#0f172a; --panel:#1e293b; --accent:#3b82f6; --accent2:#10b981; --text:#e2e8f0; --muted:#94a3b8; --border:#334155; --ok:#10b981; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(59,130,246,0.12), transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 10%, rgba(16,185,129,0.08), transparent 60%),
    var(--bg);
    background-attachment: fixed;
    color:var(--text); min-height:100vh; }
  .container { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  h1 { margin:0 0 8px; font-size: 26px; }
  .sub { color: var(--muted); margin-bottom: 24px; font-size: 14px; }
  .panel { background: linear-gradient(180deg, rgba(30,41,59,0.9), rgba(30,41,59,0.75)); border:1px solid var(--border); border-radius:14px; padding:22px; margin-bottom:16px; backdrop-filter: blur(8px); box-shadow: 0 1px 0 rgba(255,255,255,0.03) inset, 0 10px 30px -12px rgba(0,0,0,0.5); }
  .row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
  label { font-size:13px; color: var(--muted); display:block; margin-bottom:6px; }
  select, input[type=text], input[type=number], input[type=file] { background:#0b1220; color:var(--text); border:1px solid var(--border); border-radius:8px; padding:10px 12px; font-size:14px; }
  select { min-width: 220px; }
  button { background: linear-gradient(135deg, var(--accent), #2563eb); color:white; border:0; padding:10px 18px; border-radius:8px; font-size:14px; cursor:pointer; font-weight:600; transition: transform .08s ease, box-shadow .2s ease, filter .2s ease; box-shadow: 0 1px 2px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.04) inset; }
  button:hover { filter: brightness(1.08); box-shadow: 0 6px 20px -6px rgba(59,130,246,0.5), 0 0 0 1px rgba(255,255,255,0.06) inset; }
  button:active { transform: translateY(1px); }
  button:disabled { opacity:0.5; cursor:not-allowed; }
  button.secondary { background:#475569; box-shadow:none; }
  button.secondary:hover { background:#556478; box-shadow:none; filter:none; }
  .grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:8px; margin-top:12px; max-height: 420px; overflow-y:auto; padding:4px; }
  .chip { display:flex; align-items:center; gap:8px; padding:10px 12px; background:#0b1220; border:1px solid var(--border); border-radius:8px; font-size:13px; cursor:pointer; user-select:none; }
  .chip:hover { border-color: var(--accent); }
  .chip input { margin:0; cursor:pointer; }
  .chip .count { margin-left:auto; color: var(--muted); font-size:12px; background:#1e293b; padding:2px 8px; border-radius:10px; }
  .stats { color: var(--muted); font-size:13px; margin-top:10px; }
  .log { background:#0b1220; border:1px solid var(--border); border-radius:8px; padding:12px; font-family: ui-monospace, monospace; font-size:12px; max-height:260px; overflow-y:auto; white-space:pre-wrap; color: var(--muted); }
  .toolbar { display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; }
  hr { border:0; border-top:1px solid var(--border); margin:16px 0; }
  .ok { color: var(--ok); }
  .err { color: #f87171; }
  details { background:#0b1220; border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-top:8px; }
  details summary { cursor:pointer; font-size:13px; color: var(--muted); }
  .auth-wrap { max-width: 400px; margin: 72px auto; padding: 32px; }
  .auth-wrap input { width:100%; margin-bottom:10px; }
  .auth-err { color:#f87171; font-size:13px; margin-top:6px; min-height:18px; }
  .topbar { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; font-size:13px; color:var(--muted); }
  .topbar button { background:#475569; padding:6px 12px; font-size:12px; box-shadow:none; }
  .brand { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .logo { width:40px; height:40px; border-radius:11px; background: linear-gradient(135deg, var(--accent), var(--accent2)); display:grid; place-items:center; box-shadow: 0 8px 24px -8px rgba(59,130,246,0.55); }
  .logo svg { width:24px; height:24px; }
  .brand h1 { font-size: 22px; margin:0; letter-spacing:-0.01em; }
  .brand .tag { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.12em; }
  .auth-brand { flex-direction:column; align-items:center; text-align:center; gap:14px; margin-bottom:20px; }
  .auth-brand .logo { width:54px; height:54px; border-radius:14px; }
  .auth-brand .logo svg { width:32px; height:32px; }
  .auth-brand h1 { font-size: 24px; }
  input:focus, select:focus { outline:none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59,130,246,0.18); }
</style>
</head>
<body>

<div id="authScreen" class="auth-wrap panel" style="display:none">
  <div class="brand auth-brand">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="white"/><rect x="13" y="3" width="8" height="8" rx="1.5" fill="white" opacity="0.8"/><rect x="3" y="13" width="8" height="8" rx="1.5" fill="white" opacity="0.8"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="white"/></svg></div>
    <div>
      <h1>Welcome back</h1>
      <div class="sub" style="margin:4px 0 0">Sign in to SplitSheet</div>
    </div>
  </div>
  <label>Email</label>
  <input type="email" id="authEmail" autocomplete="username"/>
  <label>Password</label>
  <input type="password" id="authPassword" autocomplete="current-password"/>
  <button id="authSignIn" style="width:100%">Sign in</button>
  <div class="auth-err" id="authErr"></div>
</div>

<div id="appScreen" class="container" style="display:none">
  <div class="topbar">
    <div>Signed in as <span id="userEmail" style="color:var(--text)"></span></div>
    <div style="display:flex; gap:8px">
      <button id="historyBtn">History</button>
      <button id="signOutBtn">Sign out</button>
    </div>
  </div>
  <div class="brand">
    <div class="logo"><svg viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="1.5" fill="white"/><rect x="13" y="3" width="8" height="8" rx="1.5" fill="white" opacity="0.8"/><rect x="3" y="13" width="8" height="8" rx="1.5" fill="white" opacity="0.8"/><rect x="13" y="13" width="8" height="8" rx="1.5" fill="white"/></svg></div>
    <div>
      <h1>SplitSheet</h1>
      <div class="tag">Excel destination splitter</div>
    </div>
  </div>
  <div class="sub">Upload → group by prefix (AM, G, UK, …) → get a zip with per-prefix zips, each containing an "all" and a "≥ Ns" CSV set.</div>

  <div id="historyModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:50; padding:40px 20px; overflow-y:auto">
    <div class="panel" style="max-width:760px; margin:0 auto">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px">
        <strong style="font-size:18px">History</strong>
        <button class="secondary" id="historyClose">Close</button>
      </div>
      <div id="historyBody" style="font-size:13px; color:var(--muted)">Loading…</div>
    </div>
  </div>

  <div class="panel">
    <label>1. Upload Excel file (.xlsx / .xls / .csv)</label>
    <input type="file" id="file" accept=".xlsx,.xls,.csv" />
    <div class="stats" id="fileInfo"></div>
  </div>

  <div class="panel" id="configPanel" style="display:none">
    <div class="row">
      <div>
        <label>Sheet</label>
        <select id="sheetName"></select>
      </div>
      <div>
        <label>Destination column</label>
        <select id="destCol"></select>
      </div>
      <div>
        <label>Date column</label>
        <select id="dateCol"></select>
      </div>
      <div>
        <label>Duration column</label>
        <select id="durCol"></select>
      </div>
      <div>
        <label>Min duration (sec)</label>
        <input type="number" id="minDur" value="10" min="0" style="width:110px"/>
      </div>
    </div>
    <div class="toolbar">
      <button id="loadDestinations">Scan destinations</button>
    </div>
  </div>

  <div class="panel" id="destPanel" style="display:none">
    <div class="row" style="justify-content:space-between">
      <div><strong id="destTitle">Prefix groups</strong> <span class="stats" id="selCount"></span></div>
      <div class="toolbar" style="margin:0">
        <button class="secondary" id="selectAll">Select all</button>
        <button class="secondary" id="clearAll">Clear</button>
      </div>
    </div>
    <div class="grid" id="destGrid"></div>
    <details id="destList"><summary>Show destinations per prefix</summary><div id="destListBody"></div></details>
    <hr/>
    <div class="row">
      <div style="flex:1;min-width:220px">
        <label>Output zip filename</label>
        <input type="text" id="zipName" value="destinations_split.zip" style="width:100%"/>
      </div>
      <div style="align-self:flex-end">
        <button id="generate">Generate &amp; Download</button>
      </div>
    </div>
    <div class="log" id="log" style="margin-top:12px; display:none"></div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://gowalptcpriqsbudxmls.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_zpntTu1S30W1M8KYPi9T3w_8NZ_q08G';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

async function renderAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('appScreen').style.display = 'block';
    document.getElementById('userEmail').textContent = session.user.email || '';
  } else {
    document.getElementById('authScreen').style.display = 'block';
    document.getElementById('appScreen').style.display = 'none';
  }
}
document.addEventListener('DOMContentLoaded', renderAuth);
sb.auth.onAuthStateChange(() => renderAuth());

document.getElementById('authSignIn').addEventListener('click', async () => {
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errEl = document.getElementById('authErr');
  errEl.textContent = '';
  if (!email || !password) { errEl.textContent = 'Enter email and password.'; return; }
  const { error } = await sb.auth.signInWithPassword({ email, password });
  if (error) errEl.textContent = error.message;
});
document.getElementById('authPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('authSignIn').click();
});
document.getElementById('signOutBtn').addEventListener('click', async () => {
  await sb.auth.signOut();
});

async function recordHistory(entry) {
  try {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    await sb.from('generations').insert({
      user_id: user.id,
      file_name: entry.fileName,
      total_rows: entry.totalRows,
      prefix_count: entry.prefixCount,
      dest_count: entry.destCount,
      min_duration: entry.minDuration,
      output_name: entry.outputName,
      details: entry.details
    });
  } catch (e) { console.warn('history insert failed', e); }
}

async function loadHistory() {
  const body = document.getElementById('historyBody');
  body.textContent = 'Loading…';
  const { data, error } = await sb.from('generations')
    .select('*').order('created_at', { ascending: false }).limit(100);
  if (error) { body.innerHTML = `<span class="err">Could not load: ${error.message}</span><div style="margin-top:10px">Make sure the <code>generations</code> table exists (see setup instructions).</div>`; return; }
  if (!data || !data.length) { body.textContent = 'No generations yet.'; return; }
  body.innerHTML = `<table style="width:100%; border-collapse:collapse; font-size:13px">
    <thead><tr style="text-align:left; color:var(--muted); border-bottom:1px solid var(--border)">
      <th style="padding:8px 6px">When</th><th style="padding:8px 6px">File</th>
      <th style="padding:8px 6px">Rows</th><th style="padding:8px 6px">Prefixes</th>
      <th style="padding:8px 6px">Dests</th><th style="padding:8px 6px">Min</th>
    </tr></thead><tbody>${
      data.map(r => `<tr style="border-bottom:1px solid var(--border)">
        <td style="padding:8px 6px; color:var(--text)">${new Date(r.created_at).toLocaleString()}</td>
        <td style="padding:8px 6px">${(r.file_name||'').replace(/</g,'&lt;')}</td>
        <td style="padding:8px 6px">${r.total_rows ?? ''}</td>
        <td style="padding:8px 6px">${r.prefix_count ?? ''}</td>
        <td style="padding:8px 6px">${r.dest_count ?? ''}</td>
        <td style="padding:8px 6px">${r.min_duration ?? ''}s</td>
      </tr>`).join('')
    }</tbody></table>`;
}
document.getElementById('historyBtn').addEventListener('click', () => {
  document.getElementById('historyModal').style.display = 'block';
  loadHistory();
});
document.getElementById('historyClose').addEventListener('click', () => {
  document.getElementById('historyModal').style.display = 'none';
});

let workbook = null;
let currentRows = [];
let currentHeaders = [];
let currentFileName = '';
let prefixGroups = {}; // { AM: { "AM 7485 MY": [rows...], ... }, ... }

const $ = (id) => document.getElementById(id);
const log = (msg, cls='') => {
  const el = $('log'); el.style.display='block';
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
};

$('file').addEventListener('change', async (e) => {
  const f = e.target.files[0];
  if (!f) return;
  currentFileName = f.name;
  const buf = await f.arrayBuffer();
  workbook = XLSX.read(buf, { type: 'array', cellDates: true });
  const sheetSel = $('sheetName');
  sheetSel.innerHTML = '';
  workbook.SheetNames.forEach(n => {
    const o = document.createElement('option'); o.value = n; o.textContent = n; sheetSel.appendChild(o);
  });
  $('fileInfo').textContent = `Loaded: ${f.name} — ${workbook.SheetNames.length} sheet(s)`;
  $('configPanel').style.display = 'block';
  loadSheet();
  sheetSel.onchange = loadSheet;
});

function loadSheet() {
  const name = $('sheetName').value;
  const sheet = workbook.Sheets[name];
  currentRows = XLSX.utils.sheet_to_json(sheet, { defval: '', raw: false });
  currentHeaders = currentRows.length ? Object.keys(currentRows[0]) : [];

  const fill = (sel, preferred) => {
    sel.innerHTML = '';
    currentHeaders.forEach(h => {
      const o = document.createElement('option'); o.value = h; o.textContent = h; sel.appendChild(o);
    });
    const match = currentHeaders.find(h => preferred.some(p => h.toLowerCase() === p))
               || currentHeaders.find(h => preferred.some(p => h.toLowerCase().includes(p)));
    if (match) sel.value = match;
  };
  fill($('destCol'), ['destination']);
  // prefer plain Destination over Destination #
  const plain = currentHeaders.find(h => h.toLowerCase().trim() === 'destination');
  if (plain) $('destCol').value = plain;
  fill($('dateCol'), ['call date','date']);
  fill($('durCol'), ['duration']);
}

function getPrefix(dest) {
  const s = (dest || '').toString().trim();
  if (!s) return '';
  const m = s.match(/^([A-Za-z]+)/);
  return m ? m[1].toUpperCase() : s.split(/\s+/)[0].toUpperCase();
}

$('loadDestinations').addEventListener('click', () => {
  const col = $('destCol').value;
  prefixGroups = {};
  currentRows.forEach(r => {
    const v = (r[col] ?? '').toString().trim();
    if (!v) return;
    const p = getPrefix(v);
    if (!prefixGroups[p]) prefixGroups[p] = {};
    if (!prefixGroups[p][v]) prefixGroups[p][v] = [];
    prefixGroups[p][v].push(r);
  });

  const prefixes = Object.keys(prefixGroups).sort();
  const grid = $('destGrid'); grid.innerHTML = '';
  prefixes.forEach(p => {
    const dests = Object.keys(prefixGroups[p]);
    const totalRows = dests.reduce((s,d) => s + prefixGroups[p][d].length, 0);
    const label = document.createElement('label');
    label.className = 'chip';
    label.innerHTML = `<input type="checkbox" value="${p}" checked/> <span><strong>${p}</strong> — ${dests.length} dest</span> <span class="count">${totalRows}</span>`;
    grid.appendChild(label);
  });

  // detail list
  const body = $('destListBody'); body.innerHTML = '';
  prefixes.forEach(p => {
    const dests = Object.keys(prefixGroups[p]).sort();
    const div = document.createElement('div');
    div.style.margin = '8px 0';
    div.innerHTML = `<div style="color:var(--text);font-weight:600;margin-bottom:4px">${p}</div>` +
      dests.map(d => `<div style="padding-left:12px;font-size:12px;color:var(--muted)">• ${d} <span style="color:#64748b">(${prefixGroups[p][d].length})</span></div>`).join('');
    body.appendChild(div);
  });

  $('destPanel').style.display = 'block';
  $('destTitle').textContent = `Prefix groups (${prefixes.length} found)`;
  updateSelCount();
  grid.addEventListener('change', updateSelCount);
});

function getCheckedPrefixes() {
  return Array.from(document.querySelectorAll('#destGrid input[type=checkbox]:checked')).map(c => c.value);
}
function updateSelCount() {
  const n = getCheckedPrefixes().length;
  const total = Object.keys(prefixGroups).length;
  $('selCount').textContent = `— ${n} of ${total} selected`;
}
$('selectAll').addEventListener('click', () => {
  document.querySelectorAll('#destGrid input[type=checkbox]').forEach(c => c.checked = true);
  updateSelCount();
});
$('clearAll').addEventListener('click', () => {
  document.querySelectorAll('#destGrid input[type=checkbox]').forEach(c => c.checked = false);
  updateSelCount();
});

function sanitizeFilename(s) {
  return s.replace(/[\\/:*?"<>|]/g, '_').trim().slice(0, 120);
}
function extractDateStr(v) {
  if (!v) return '';
  if (v instanceof Date) return v.toISOString().slice(0,10);
  const s = v.toString();
  const m = s.match(/\d{4}-\d{2}-\d{2}/);
  if (m) return m[0];
  const d = new Date(s);
  if (!isNaN(d)) return d.toISOString().slice(0,10);
  return s.slice(0,10);
}
function durationToSeconds(v) {
  if (v == null || v === '') return 0;
  if (typeof v === 'number') {
    // Excel stores time as fraction of day
    if (v < 1) return Math.round(v * 86400);
    return Math.round(v);
  }
  const s = v.toString().trim();
  const parts = s.split(':').map(Number);
  if (parts.some(isNaN)) return 0;
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  if (parts.length === 1) return parts[0];
  return 0;
}
function rowsToCsv(rows, headers) {
  const esc = (v) => {
    if (v == null) return '';
    const s = v.toString();
    if (/[",\n\r]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  const head = headers.map(esc).join(',');
  const body = rows.map(r => headers.map(h => esc(r[h])).join(',')).join('\n');
  return head + '\n' + body;
}

$('generate').addEventListener('click', async () => {
  const selected = getCheckedPrefixes();
  if (!selected.length) { alert('Select at least one prefix.'); return; }
  const dateCol = $('dateCol').value;
  const durCol  = $('durCol').value;
  const minDur  = parseInt($('minDur').value || '10', 10);
  $('log').innerHTML = '';
  log(`Generating ${selected.length} prefix zip(s) (min duration ${minDur}s)...`);

  const master = new JSZip();

  for (const prefix of selected) {
    const destMap = prefixGroups[prefix];
    const dests = Object.keys(destMap).sort();
    const prefixZip = new JSZip();
    const allInner = new JSZip();
    const filtInner = new JSZip();

    let totalAll = 0, totalFilt = 0;

    for (const dest of dests) {
      const rows = destMap[dest];
      const dateStr = rows.length && dateCol ? extractDateStr(rows[0][dateCol]) : '';

      // All
      const nameAll = sanitizeFilename(`${rows.length}_${dest}_${dateStr}`) + '.csv';
      allInner.file(nameAll, rowsToCsv(rows, currentHeaders));
      totalAll += rows.length;

      // Filtered
      const filtered = rows.filter(r => durationToSeconds(r[durCol]) >= minDur);
      if (filtered.length) {
        const nameF = sanitizeFilename(`${filtered.length}_${dest}_${dateStr}`) + '.csv';
        filtInner.file(nameF, rowsToCsv(filtered, currentHeaders));
        totalFilt += filtered.length;
      }
    }

    const allBlob  = await allInner.generateAsync({ type: 'uint8array' });
    const filtBlob = await filtInner.generateAsync({ type: 'uint8array' });
    prefixZip.file(`${prefix}_all.zip`, allBlob);
    prefixZip.file(`${prefix}_${minDur}s+.zip`, filtBlob);

    const prefixBlob = await prefixZip.generateAsync({ type: 'uint8array' });
    master.file(`${prefix}.zip`, prefixBlob);
    log(`  ✓ ${prefix}.zip — ${dests.length} dest, all:${totalAll}, ≥${minDur}s:${totalFilt}`, 'ok');
  }

  const blob = await master.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = $('zipName').value || 'destinations_split.zip';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
  log(`Done.`, 'ok');

  const details = {};
  let totalRows = 0, totalDests = 0;
  for (const p of selected) {
    const dests = Object.keys(prefixGroups[p]);
    const rows = dests.reduce((s,d) => s + prefixGroups[p][d].length, 0);
    details[p] = { destinations: dests.length, rows };
    totalRows += rows; totalDests += dests.length;
  }
  recordHistory({
    fileName: currentFileName,
    totalRows, prefixCount: selected.length, destCount: totalDests,
    minDuration: minDur,
    outputName: $('zipName').value || 'destinations_split.zip',
    details
  });
});
</script>
</body>
